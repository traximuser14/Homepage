<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Tailwind Navbar</title>
  </head>
  <body class="bg-gray-100">
    <!-- Navbar -->
    <nav class="bg-white shadow-md">
      <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-16">
          <!-- Logo -->
          <a href="#" class="text-2xl font-bold text-blue-600"> Logo </a>

          <!-- Desktop Menu -->
          <ul class="hidden md:flex items-center gap-8 font-medium">
            <li><a href="#" class="hover:text-blue-600 transition">Home</a></li>
            <li>
              <a href="#" class="hover:text-blue-600 transition">About</a>
            </li>
            <li>
              <a href="#" class="hover:text-blue-600 transition">Services</a>
            </li>
            <li>
              <a href="#" class="hover:text-blue-600 transition">Portfolio</a>
            </li>
            <li>
              <a href="#" class="hover:text-blue-600 transition">Contact</a>
            </li>
          </ul>

          <!-- Button -->
          <a
            href="#"
            class="hidden md:block bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition"
          >
            Get Started
          </a>

          <!-- Mobile Menu Icon -->
          <button class="md:hidden">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-7 h-7"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </button>
        </div>
      </div>
    </nav>
  </body>
</html>
